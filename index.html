<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose your language / Choisissez votre langue</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* IMAGE */
    .hero-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* HEADLINE (clean, one-line, premium feel) */
    .headline {
      position: absolute;
      top: 8%;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 2.5rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.4);
      white-space: nowrap;
    }

    /* BUTTONS */
    .button-container {
      position: absolute;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      width: 60%;
      max-width: 700px;
      justify-content: center;
    }

    .btn {
      flex: 1;
      text-align: center;
      padding: 18px;
      border-radius: 14px;
      color: white;
      font-weight: bold;
      text-decoration: none;
      font-size: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.03);
      opacity: 0.95;
    }

    .en {
      background: linear-gradient(135deg, #2347b7, #2b63ef);
    }

    .fr {
      background: linear-gradient(135deg, #169a46, #28c55f);
    }

    /* MOBILE */
    @media (max-width: 700px) {
      .headline {
        font-size: 1.6rem;
        top: 6%;
        white-space: normal;
      }

      .button-container {
        flex-direction: column;
        width: 85%;
        bottom: 5%;
        gap: 15px;
      }

      .btn {
        padding: 16px;
      }
    }
  </style>
</head>

<body>

  <div class="stage">

    <!-- IMAGE SWITCH -->
    <picture>
      <source media="(max-width: 700px)" srcset="language-page-mobile.png?v=1">
      <img src="language-page.png?v=1" alt="Feel great again — it starts here." class="hero-image">
    </picture>

    <!-- HEADLINE -->
    <div class="headline">
      Feel great again — it starts here.
    </div>

    <!-- BUTTONS -->
    <div class="button-container">
      <a href="/en/" class="btn en">🇬🇧 English</a>
      <a href="/fr/" class="btn fr">🇫🇷 Français</a>
    </div>

  </div>

</body>
</html>
