
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Choose your language / Choisissez votre langue</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
  background:#dfe4ea;
}

.stage{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

.hero-image{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center center;
  display:block;
}

/* top fade for headline */
.stage::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:30%;
  background:linear-gradient(to bottom, rgba(0,0,0,.28), rgba(0,0,0,.06), transparent);
  z-index:1;
}

/* headline */
.headline{
  position:absolute;
  top:5%;
  left:50%;
  transform:translateX(-50%);
  width:88%;
  text-align:center;
  color:#fff;
  font-weight:700;
  font-size:clamp(28px,3vw,58px);
  line-height:1.12;
  text-shadow:0 4px 18px rgba(0,0,0,.28);
  z-index:3;
}

/* CTA desktop */
.button-container{
  position:absolute;
  left:50%;
  bottom:4%;
  transform:translateX(-50%);
  display:flex;
  flex-direction:row;
  gap:18px;
  z-index:3;
}

.btn{
  min-width:165px;
  padding:12px 18px;
  border-radius:14px;
  text-decoration:none;
  color:#fff;
  font-weight:700;
  font-size:18px;
  text-align:center;
  box-shadow:0 8px 20px rgba(0,0,0,.22);
  transition:.2s ease;
}

.btn:hover{
  transform:translateY(-2px);
}

.en{
  background:linear-gradient(135deg,#2449bc,#2f66ef);
}

.fr{
  background:linear-gradient(135deg,#179945,#29c95d);
}

/* MOBILE */
@media (max-width:700px){

  .hero-image{
    object-position:center center;
  }

  .headline{
    top:4%;
    width:92%;
    font-size:clamp(16px,7vw,34px);
    line-height:1.15;
  }

  /* IMPORTANT: side-by-side on mobile too */
  .button-container{
    width:auto;
    bottom:3%;
    gap:10px;
    flex-direction:row;
    justify-content:center;
    align-items:center;
  }

  .btn{
    min-width:135px;
    padding:10px 12px;
    font-size:15px;
    border-radius:12px;
  }
}
</style>
</head>

<body>

<div class="stage">

<picture>
  <source media="(max-width:700px)" srcset="language-page-mobile.png">
  <img src="language-page.png" alt="" class="hero-image">
</picture>

<div class="headline">
Feel like yourself again — it starts here.
</div>

<div class="button-container">
  <a href="/en/" class="btn en">🇬🇧 English</a>
  <a href="/fr/" class="btn fr">🇫🇷 Français</a>
</div>

</div>

</body>
</html>
