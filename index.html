<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose your language / Choisissez votre langue</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #dfe4ea;
    }

    body {
      overflow: hidden;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #dfe4ea;
    }

    picture,
    .hero-image {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hero-image {
      object-fit: cover;
      object-position: center center;
    }

    .headline {
      position: absolute;
      top: 6%;
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      text-align: center;
      color: white;
      font-weight: 600;
      font-size: clamp(24px, 3vw, 48px);
      line-height: 1.15;
      text-shadow: 0 4px 18px rgba(0,0,0,0.28);
      z-index: 3;
      pointer-events: none;
    }

    .button-container {
      position: absolute;
      left: 50%;
      bottom: 5%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      width: min(700px, 62vw);
      z-index: 3;
    }

    .btn {
      flex: 1;
      text-align: center;
      padding: 18px;
      border-radius: 14px;
      color: white;
      font-weight: 700;
      text-decoration: none;
      font-size: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .btn:hover {
      transform: scale(1.03);
      opacity: 0.95;
    }

    .en {
      background: linear-gradient(135deg, #2347b7, #2b63ef);
    }

    .fr {
      background: linear-gradient(135deg, #169a46, #28c55f);
    }

    @media (max-width: 700px) {
      .headline {
        top: 5%;
        font-size: clamp(18px, 7vw, 30px);
        line-height: 1.2;
      }

      .button-container {
        flex-direction: column;
        width: 86%;
        bottom: 3.5%;
        gap: 14px;
      }

      .btn {
        padding: 16px;
        font-size: 18px;
        border-radius: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <picture>
      <source media="(max-width: 700px)" srcset="language-page-mobile.png?v=1">
      <img src="language-page.png?v=1" alt="Feel great again" class="hero-image">
    </picture>

    <div class="headline">Feel great again — it starts here.</div>

    <div class="button-container">
      <a href="/en/" class="btn en">🇬🇧 English</a>
      <a href="/fr/" class="btn fr">🇫🇷 Français</a>
    </div>
  </div>
</body>
</html>
